# HydroOJ testdata config
# 默认分组（对应 mkin.h 中 25 组测试数据的结构）：
#   Subtask 0: 样例        (case 1-2)   分值 10
#   Subtask 1: 小规模+特殊  (case 3-8)   分值 20
#   Subtask 2: Hack        (case 9-11)  分值 15
#   Subtask 3: 中大规模     (case 12-20) 分值 30
#   Subtask 4: 随机回归     (case 21-25) 分值 25
#
# 按题目需要修改 scores、添加 type/if 依赖等

type: default
time: 1s
memory: 512m

subtasks:
  - score: 10
    id: 0
    cases:
      - input: 1.in
        output: 1.out
      - input: 2.in
        output: 2.out

  - score: 20
    id: 1
    cases:
      - input: 3.in
        output: 3.out
      - input: 4.in
        output: 4.out
      - input: 5.in
        output: 5.out
      - input: 6.in
        output: 6.out
      - input: 7.in
        output: 7.out
      - input: 8.in
        output: 8.out

  - score: 15
    id: 2
    cases:
      - input: 9.in
        output: 9.out
      - input: 10.in
        output: 10.out
      - input: 11.in
        output: 11.out

  - score: 30
    id: 3
    cases:
      - input: 12.in
        output: 12.out
      - input: 13.in
        output: 13.out
      - input: 14.in
        output: 14.out
      - input: 15.in
        output: 15.out
      - input: 16.in
        output: 16.out
      - input: 17.in
        output: 17.out
      - input: 18.in
        output: 18.out
      - input: 19.in
        output: 19.out
      - input: 20.in
        output: 20.out

  - score: 25
    id: 4
    cases:
      - input: 21.in
        output: 21.out
      - input: 22.in
        output: 22.out
      - input: 23.in
        output: 23.out
      - input: 24.in
        output: 24.out
      - input: 25.in
        output: 25.out
